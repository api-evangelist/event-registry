openapi: 3.1.0
info:
  title: Event Registry (NewsAPI.ai)
  description: >
    Event Registry (NewsAPI.ai) is the world's leading news intelligence platform providing
    a REST API for accessing global news articles, trending topics, event detection, named
    entities, sentiment analysis, and media monitoring across 150,000+ sources in 60+
    languages, with historical archive access dating back to 2014. All requests are POST
    with JSON bodies and require an apiKey field.
  version: "1.0.0"
  contact:
    name: Event Registry Support
    email: info@eventregistry.org
    url: https://newsapi.ai
  termsOfService: https://newsapi.ai/terms
  license:
    name: Proprietary
    url: https://newsapi.ai/plans
externalDocs:
  description: Official API Documentation
  url: https://newsapi.ai/documentation
servers:
  - url: https://eventregistry.org/api/v1
    description: Production API server
security:
  - apiKeyAuth: []
components:
  securitySchemes:
    apiKeyAuth:
      type: apiKey
      in: query
      name: apiKey
      description: >
        API key obtained from newsapi.ai/register. Include as a field in the JSON POST body
        or as a query parameter named apiKey.
  schemas:
    ApiKeyParam:
      type: object
      required:
        - apiKey
      properties:
        apiKey:
          type: string
          description: Your NewsAPI.ai API key.
    ContentFilterParams:
      type: object
      properties:
        keyword:
          type: string
          description: >
            Secondary keyword filter. Use conceptUri as the primary search method.
            Comma-separate individual words for multi-term matching (e.g., "SaaS, acquisition, merger").
        conceptUri:
          type: string
          description: >
            Primary search filter. URI(s) identifying concepts/entities (comma-separated for multiple).
            Resolve names to URIs using /suggestConceptsFast first.
        categoryUri:
          type: string
          description: Category URI(s) to filter by (comma-separated).
        sourceUri:
          type: string
          description: Specific news source URI(s) to filter by (comma-separated).
        sourceLocationUri:
          type: string
          description: Filter by where news sources are based (country/region URI, comma-separated).
        authorUri:
          type: string
          description: Author URI(s) to filter by (comma-separated).
        locationUri:
          type: string
          description: Location URI(s) mentioned in content (comma-separated).
        lang:
          type: string
          description: Language code(s) to filter by (comma-separated ISO codes, e.g. "eng", "deu", "fra").
        dateStart:
          type: string
          format: date
          description: Start date inclusive (YYYY-MM-DD).
        dateEnd:
          type: string
          format: date
          description: End date inclusive (YYYY-MM-DD).
        forceMaxDataTimeWindow:
          type: integer
          enum: [7, 31]
          description: Limit results to recent data — 7 (last week) or 31 (last month).
        keywordLoc:
          type: string
          enum: [body, title, "title,body"]
          description: Where to match keywords. Default "body".
        keywordOper:
          type: string
          enum: [and, or]
          description: Boolean operator for multiple keywords. Default "and".
        minSentiment:
          type: number
          minimum: -1
          maximum: 1
          description: Minimum article sentiment score (-1 to 1).
        maxSentiment:
          type: number
          minimum: -1
          maximum: 1
          description: Maximum article sentiment score (-1 to 1).
        startSourceRankPercentile:
          type: integer
          minimum: 0
          maximum: 100
          description: Min source rank percentile (0=most important). Default 0.
        endSourceRankPercentile:
          type: integer
          minimum: 0
          maximum: 100
          description: Max source rank percentile. Default 100.
        ignoreKeyword:
          type: string
          description: Exclude articles/events mentioning these keywords (comma-separated).
        ignoreConceptUri:
          type: string
          description: Exclude by concept URI(s) (comma-separated).
        ignoreCategoryUri:
          type: string
          description: Exclude by category URI(s) (comma-separated).
        ignoreSourceUri:
          type: string
          description: Exclude by source URI(s) (comma-separated).
        ignoreSourceLocationUri:
          type: string
          description: Exclude by source location URI(s) (comma-separated).
        ignoreAuthorUri:
          type: string
          description: Exclude by author URI(s) (comma-separated).
        ignoreLocationUri:
          type: string
          description: Exclude by location URI(s) (comma-separated).
        ignoreLang:
          type: string
          description: Exclude by language code(s) (comma-separated).
        sourceGroupUri:
          type: string
          description: Filter by source group URI(s) (comma-separated).
        conceptOper:
          type: string
          enum: [and, or]
          description: Boolean operator for multiple concepts. Default "and".
        categoryOper:
          type: string
          enum: [and, or]
          description: Boolean operator for multiple categories. Default "or".
        dateMentionStart:
          type: string
          format: date
          description: Articles mentioning dates >= this (YYYY-MM-DD).
        dateMentionEnd:
          type: string
          format: date
          description: Articles mentioning dates <= this (YYYY-MM-DD).
        isDuplicateFilter:
          type: string
          enum: [keepAll, skipDuplicates, keepOnlyDuplicates]
          description: Duplicate handling strategy. Default "keepAll". Use "skipDuplicates" to remove wire syndication noise.
        query:
          description: Advanced Query Language object for complex boolean logic. Overrides simple filter params.
    ArticleResponseControl:
      type: object
      properties:
        articleBodyLen:
          type: integer
          description: Article body length in characters. Default 1000. Use -1 for full text, 0 to exclude body.
        articlesPage:
          type: integer
          description: Page number (starting from 1). Default 1.
        articlesCount:
          type: integer
          maximum: 100
          description: Articles per page (max 100). Default 100.
        articlesSortBy:
          type: string
          enum: [date, rel, sourceImportance, sourceAlexaGlobalRank, socialScore, facebookShares]
          description: Sort order. Default "date".
        articlesSortByAsc:
          type: boolean
          description: Ascending sort order. Default false.
        dataType:
          type: string
          description: Content types (comma-separated) — "news", "pr", "blog". Default "news".
    Article:
      type: object
      properties:
        uri:
          type: string
          description: Unique article identifier.
        title:
          type: string
        body:
          type: string
          description: Article body text (length controlled by articleBodyLen).
        url:
          type: string
          format: uri
          description: Original article URL.
        date:
          type: string
          format: date
        time:
          type: string
        dateTime:
          type: string
          format: date-time
        lang:
          type: string
          description: ISO language code.
        source:
          $ref: "#/components/schemas/Source"
        sentiment:
          type: number
          minimum: -1
          maximum: 1
          description: Sentiment score (-1 very negative, +1 very positive).
        concepts:
          type: array
          items:
            $ref: "#/components/schemas/Concept"
        categories:
          type: array
          items:
            $ref: "#/components/schemas/Category"
        authors:
          type: array
          items:
            $ref: "#/components/schemas/Author"
        eventUri:
          type: string
          description: URI of the event this article belongs to.
        isDuplicate:
          type: boolean
    Event:
      type: object
      properties:
        uri:
          type: string
          description: Unique event identifier.
        title:
          type: object
          additionalProperties:
            type: string
          description: Event title keyed by language code.
        summary:
          type: object
          additionalProperties:
            type: string
          description: Event summary keyed by language code.
        articleCount:
          type: integer
          description: Number of articles grouped in this event.
        date:
          type: string
          format: date
        concepts:
          type: array
          items:
            $ref: "#/components/schemas/Concept"
        categories:
          type: array
          items:
            $ref: "#/components/schemas/Category"
        sentiment:
          type: number
          minimum: -1
          maximum: 1
        location:
          $ref: "#/components/schemas/Location"
    Source:
      type: object
      properties:
        uri:
          type: string
        title:
          type: string
        url:
          type: string
          format: uri
        ranking:
          type: object
          properties:
            importanceRank:
              type: integer
            alexaGlobalRank:
              type: integer
            alexaCountryRank:
              type: integer
    Concept:
      type: object
      properties:
        uri:
          type: string
        label:
          type: object
          additionalProperties:
            type: string
        type:
          type: string
          enum: [person, org, loc, wiki]
        score:
          type: number
    Category:
      type: object
      properties:
        uri:
          type: string
        label:
          type: string
        wgt:
          type: integer
    Author:
      type: object
      properties:
        uri:
          type: string
        name:
          type: string
        isAgency:
          type: boolean
    Location:
      type: object
      properties:
        uri:
          type: string
        label:
          type: object
          additionalProperties:
            type: string
        type:
          type: string
        lat:
          type: number
        long:
          type: number
    SuggestResult:
      type: object
      properties:
        uri:
          type: string
          description: Unique URI for the entity, for use in search filters.
        label:
          type: object
          additionalProperties:
            type: string
          description: Display label keyed by language code.
        type:
          type: string
          description: Entity type (concept, source, location, category, author).
    TokenUsage:
      type: object
      properties:
        tokensUsed:
          type: number
          description: Tokens consumed by this request.
        remaining:
          type: number
          description: Tokens remaining in the current quota period.
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
paths:
  /article/getArticles:
    post:
      operationId: searchArticles
      summary: Search news articles
      description: >
        Search news articles by concepts, sources, categories, dates, language, and sentiment.
        Returns up to 100 articles per call. Use /suggestConceptsFast to resolve entity names
        to URIs before searching. Set resultType to "articles" in the request body.
      tags:
        - Articles
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/ApiKeyParam"
                - $ref: "#/components/schemas/ContentFilterParams"
                - $ref: "#/components/schemas/ArticleResponseControl"
              properties:
                resultType:
                  type: string
                  default: articles
                  description: Must be "articles".
            example:
              apiKey: "YOUR_API_KEY"
              conceptUri: "http://en.wikipedia.org/wiki/Artificial_intelligence"
              dateStart: "2026-01-01"
              dateEnd: "2026-06-01"
              lang: "eng"
              articlesCount: 10
              articleBodyLen: 500
              resultType: "articles"
      responses:
        "200":
          description: Successful response with articles array.
          content:
            application/json:
              schema:
                type: object
                properties:
                  articles:
                    type: object
                    properties:
                      results:
                        type: array
                        items:
                          $ref: "#/components/schemas/Article"
                      totalResults:
                        type: integer
                      page:
                        type: integer
                      count:
                        type: integer
        "401":
          description: Unauthorized — invalid or missing API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limit exceeded — daily token quota exhausted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /article/getArticle:
    post:
      operationId: getArticleDetails
      summary: Get full article details by URI
      description: >
        Retrieve full details for one or more articles by their URI(s). Use this after
        obtaining article URIs from /article/getArticles to fetch complete content and metadata.
      tags:
        - Articles
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/ApiKeyParam"
              properties:
                articleUri:
                  oneOf:
                    - type: string
                    - type: array
                      items:
                        type: string
                  description: Article URI or array of URIs.
                articleBodyLen:
                  type: integer
                  description: Article body length in characters. Default -1 (full text).
              required:
                - articleUri
            example:
              apiKey: "YOUR_API_KEY"
              articleUri: "850438242"
              articleBodyLen: -1
      responses:
        "200":
          description: Article details object keyed by article URI.
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  $ref: "#/components/schemas/Article"
        "401":
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /article/getArticlesForTopicPage:
    post:
      operationId: getTopicPageArticles
      summary: Get articles for a topic page
      description: >
        Returns articles matching a user-created topic page (pre-configured search profile).
        Topic pages are created and managed on the newsapi.ai website.
      tags:
        - Articles
        - Topic Pages
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/ApiKeyParam"
              properties:
                uri:
                  type: string
                  description: Topic page URI.
                articlesPage:
                  type: integer
                  description: Page number (starting from 1). Default 1.
                articlesCount:
                  type: integer
                  maximum: 100
                  description: Articles per page (max 100). Default 100.
                articleBodyLen:
                  type: integer
                  description: Article body length in characters. Default 1000.
              required:
                - uri
      responses:
        "200":
          description: Articles matching the topic page.
          content:
            application/json:
              schema:
                type: object
                properties:
                  articles:
                    type: object
                    properties:
                      results:
                        type: array
                        items:
                          $ref: "#/components/schemas/Article"
                      totalResults:
                        type: integer
        "401":
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /event/getEvents:
    post:
      operationId: searchEvents
      summary: Search news events
      description: >
        Search events — clusters of related articles about the same real-world happening.
        Events deduplicate coverage: one entry per story instead of per article. Returns
        up to 50 events per call. Ideal for high-level overviews and trend analysis.
      tags:
        - Events
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/ApiKeyParam"
                - $ref: "#/components/schemas/ContentFilterParams"
              properties:
                resultType:
                  type: string
                  default: events
                  description: Must be "events".
                minArticlesInEvent:
                  type: integer
                  description: Minimum number of articles in the event.
                maxArticlesInEvent:
                  type: integer
                  description: Maximum number of articles in the event.
                reportingDateStart:
                  type: string
                  format: date
                  description: Filter by average article publishing date >= this (YYYY-MM-DD).
                reportingDateEnd:
                  type: string
                  format: date
                  description: Filter by average article publishing date <= this (YYYY-MM-DD).
                eventsPage:
                  type: integer
                  description: Page number (starting from 1). Default 1.
                eventsCount:
                  type: integer
                  maximum: 50
                  description: Events per page (max 50). Default 50.
                eventsSortBy:
                  type: string
                  enum: [date, rel, size, socialScore]
                  description: Sort order. Default "date". Use "size" for biggest stories.
                eventsSortByAsc:
                  type: boolean
                  description: Ascending sort order. Default false.
                minSentimentEvent:
                  type: number
                  minimum: -1
                  maximum: 1
                  description: Minimum event sentiment score.
                maxSentimentEvent:
                  type: number
                  minimum: -1
                  maximum: 1
                  description: Maximum event sentiment score.
                query:
                  description: Advanced Query Language object for complex boolean logic.
            example:
              apiKey: "YOUR_API_KEY"
              conceptUri: "http://en.wikipedia.org/wiki/Climate_change"
              dateStart: "2026-01-01"
              eventsCount: 10
              eventsSortBy: "size"
              resultType: "events"
      responses:
        "200":
          description: Successful response with events array.
          content:
            application/json:
              schema:
                type: object
                properties:
                  events:
                    type: object
                    properties:
                      results:
                        type: array
                        items:
                          $ref: "#/components/schemas/Event"
                      totalResults:
                        type: integer
                      page:
                        type: integer
                      count:
                        type: integer
        "401":
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limit exceeded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /event/getEvent:
    post:
      operationId: getEventDetails
      summary: Get full event details by URI
      description: >
        Retrieve full details for one or more events by their URI(s), including all grouped
        articles, concepts, categories, and geographic data.
      tags:
        - Events
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/ApiKeyParam"
              properties:
                eventUri:
                  oneOf:
                    - type: string
                    - type: array
                      items:
                        type: string
                  description: Event URI or array of URIs.
                articleBodyLen:
                  type: integer
                  description: Article body length in characters. Default 1000.
              required:
                - eventUri
            example:
              apiKey: "YOUR_API_KEY"
              eventUri: "eng-12345678"
      responses:
        "200":
          description: Event details object keyed by event URI.
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  $ref: "#/components/schemas/Event"
        "401":
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /event/getEventsForTopicPage:
    post:
      operationId: getTopicPageEvents
      summary: Get events for a topic page
      description: >
        Returns events matching a user-created topic page (pre-configured search profile).
      tags:
        - Events
        - Topic Pages
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/ApiKeyParam"
              properties:
                uri:
                  type: string
                  description: Topic page URI.
                eventsPage:
                  type: integer
                  description: Page number (starting from 1). Default 1.
                eventsCount:
                  type: integer
                  maximum: 50
                  description: Events per page (max 50). Default 50.
              required:
                - uri
      responses:
        "200":
          description: Events matching the topic page.
          content:
            application/json:
              schema:
                type: object
                properties:
                  events:
                    type: object
                    properties:
                      results:
                        type: array
                        items:
                          $ref: "#/components/schemas/Event"
                      totalResults:
                        type: integer
        "401":
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /suggestConceptsFast:
    post:
      operationId: suggestConcepts
      summary: Suggest concept URIs by name prefix
      description: >
        Look up concept URIs (people, organizations, locations, things) by name prefix.
        Always resolve entity names to URIs using this endpoint before passing them to
        conceptUri filters in search operations.
      tags:
        - Suggest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/ApiKeyParam"
              properties:
                prefix:
                  type: string
                  description: Short name prefix to search for (1-3 words). Performs prefix matching.
                lang:
                  type: string
                  description: Language for label display and matching. Default "eng".
                conceptType:
                  type: string
                  description: Filter by concept type — "person", "org", "loc", "wiki".
              required:
                - prefix
            example:
              apiKey: "YOUR_API_KEY"
              prefix: "Tesla"
              lang: "eng"
      responses:
        "200":
          description: List of matching concept suggestions with URIs.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SuggestResult"
        "401":
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /suggestCategoriesFast:
    post:
      operationId: suggestCategories
      summary: Suggest category URIs by name prefix
      description: >
        Look up news topic category URIs (business, tech, sports, etc.) by name prefix.
        Use returned URIs in categoryUri filters.
      tags:
        - Suggest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/ApiKeyParam"
              properties:
                prefix:
                  type: string
                  description: Short category name prefix to search for.
                lang:
                  type: string
                  description: Language for label display. Default "eng".
              required:
                - prefix
            example:
              apiKey: "YOUR_API_KEY"
              prefix: "Business"
      responses:
        "200":
          description: List of matching category suggestions with URIs.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SuggestResult"
        "401":
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /suggestSourcesFast:
    post:
      operationId: suggestSources
      summary: Suggest news source URIs by name prefix
      description: >
        Look up news source URIs (e.g., Reuters, BBC) by name prefix.
        Use returned URIs in sourceUri filters.
      tags:
        - Suggest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/ApiKeyParam"
              properties:
                prefix:
                  type: string
                  description: Short source name prefix to search for.
                lang:
                  type: string
                  description: Language for matching. Default "eng".
              required:
                - prefix
            example:
              apiKey: "YOUR_API_KEY"
              prefix: "Reuters"
      responses:
        "200":
          description: List of matching source suggestions with URIs.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SuggestResult"
        "401":
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /suggestLocationsFast:
    post:
      operationId: suggestLocations
      summary: Suggest location URIs by name prefix
      description: >
        Look up location URIs (countries, cities, regions) by name prefix.
        Use returned URIs in locationUri or sourceLocationUri filters.
        Always use English location names.
      tags:
        - Suggest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/ApiKeyParam"
              properties:
                prefix:
                  type: string
                  description: Short location name prefix in English.
                lang:
                  type: string
                  description: Language for label display. Default "eng".
              required:
                - prefix
            example:
              apiKey: "YOUR_API_KEY"
              prefix: "Germany"
      responses:
        "200":
          description: List of matching location suggestions with URIs.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SuggestResult"
        "401":
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /suggestAuthorsFast:
    post:
      operationId: suggestAuthors
      summary: Suggest author URIs by name prefix
      description: >
        Look up journalist/author URIs by name prefix.
        Use returned URIs in authorUri filters.
      tags:
        - Suggest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/ApiKeyParam"
              properties:
                prefix:
                  type: string
                  description: Short author name prefix to search for.
                lang:
                  type: string
                  description: Language for matching. Default "eng".
              required:
                - prefix
            example:
              apiKey: "YOUR_API_KEY"
              prefix: "John Smith"
      responses:
        "200":
          description: List of matching author suggestions with URIs.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SuggestResult"
        "401":
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /usage:
    post:
      operationId: getApiUsage
      summary: Get API token usage
      description: >
        Check API token usage — tokens consumed and tokens remaining in the current quota
        period for the authenticated API key.
      tags:
        - Usage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApiKeyParam"
            example:
              apiKey: "YOUR_API_KEY"
      responses:
        "200":
          description: Token usage details.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenUsage"
        "401":
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
tags:
  - name: Articles
