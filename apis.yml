aid: event-registry
name: Event Registry
description: >
  Event Registry (NewsAPI.ai) is the world's leading news intelligence platform providing
  a REST API for accessing global news articles, trending topics, event detection, named
  entities, sentiment analysis, and media monitoring across 150,000+ sources in 60+ languages,
  with historical archive access dating back to 2014.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
url: https://raw.githubusercontent.com/api-evangelist/event-registry/refs/heads/main/apis.yml
created: 2026-06-13
modified: 2026-06-13
specificationVersion: "0.19"
tags:
