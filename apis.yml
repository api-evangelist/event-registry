  - Event Detection
  - Named Entity Recognition
  - Sentiment Analysis
  - Media Analytics
  - News API
apis:
  - aid: event-registry:news-api
    name: Event Registry News API
    description: >
      REST API for querying global news articles and clustered events with AI-enriched
      metadata including named entities, sentiment scores, topic categories, and social
      media engagement metrics. Supports keyword, concept, location, source, and
      date-range filtering across 150,000+ sources in 60+ languages.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://newsapi.ai
    baseURL: https://eventregistry.org/api/v1
    tags:
